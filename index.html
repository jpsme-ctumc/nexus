<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project OJT NEXUS | JPSME CTU Main</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; /* Bright Royal Blue */
            --secondary: #f59e0b; /* Warm Gold */
            --text-dark: #1e293b;
            --text-light: #475569;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Animated Pastel Gradient Background */
            background: linear-gradient(-45deg, #fbc2eb, #a18cd1, #fad0c4, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- FLOATING MACHINE GIFS --- */
        .bg-gif {
            position: fixed;
            z-index: -1;
            opacity: 0.12; /* Very subtle so it doesn't distract */
            mix-blend-mode: multiply; /* Blends nicely with the pastel colors */
            pointer-events: none;
            border-radius: 20px;
        }

        /* You can swap these links with any other machine GIFs you prefer */
        .gif1 { top: 5%; left: 2%; width: 300px; transform: rotate(10deg); }
        .gif2 { bottom: 5%; right: 2%; width: 350px; transform: rotate(-15deg); }
        .gif3 { top: 40%; left: 75%; width: 250px; transform: rotate(5deg); }
        .gif4 { bottom: 30%; left: 5%; width: 200px; transform: rotate(-5deg); }

        /* --- HEADER --- */
        header {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 2rem 2rem;
            text-align: center;
            box-shadow: 0 4px 30px var(--glass-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h2 {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--text-light);
            text-transform: uppercase;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-top: 0.5rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .nav-btn {
            background: var(--glass-bg);
            color: var(--primary);
            border: 1px solid var(--glass-border);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.2);
        }

        /* --- MAIN CONTAINER --- */
        main {
            flex-grow: 1;
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            z-index: 1;
        }

        .view-section {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- DIRECTORY VIEW --- */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2.5rem;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--secondary);
            color: var(--white);
            border-color: var(--secondary);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }

        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* Glassmorphism Cards */
        .company-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px var(--glass-shadow);
            border-top: 5px solid var(--primary);
            transition: all 0.3s ease;
        }

        .company-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.7);
        }

        .company-name { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 0.8rem; line-height: 1.3;}
        .company-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
        .tag { background: rgba(37, 99, 235, 0.15); color: var(--primary); font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: 600;}
        
        .detail-group { margin-bottom: 1rem; font-size: 0.95rem; }
        .detail-label { font-weight: 600; color: var(--text-dark); display: block; margin-bottom: 2px;}
        .detail-text { color: var(--text-light); display: block;}
        
        .comments-box { 
            background: rgba(255,255,255,0.6); 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            font-style: italic; 
            border-left: 4px solid var(--secondary); 
            margin-top: 15px;
            color: var(--text-dark);
        }

        /* --- ADD COMPANY FORM --- */
        .form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px var(--glass-shadow);
            max-width: 800px;
            margin: 0 auto;
        }

        .form-container h3 { 
            margin-bottom: 2rem; 
            color: var(--primary); 
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem; color: var(--text-dark);}
        
        .form-group input[type="text"], 
        .form-group select, 
        .form-group textarea {
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 10px; 
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-group input[type="text"]:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05);}
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer;}
        .checkbox-item input { width: 16px; height: 16px; cursor: pointer;}

        .submit-btn {
            background: var(--primary); color: var(--white); border: none; padding: 15px 20px;
            border-radius: 12px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: 600; 
            transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .submit-btn:hover { 
            background: #1d4ed8; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .system-msg { 
            text-align: center; margin-top: 20px; font-weight: 600; 
            color: #047857; background: #d1fae5; padding: 12px; 
            border-radius: 8px; display: none;
            border: 1px solid #10b981;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .form-container { padding: 1.5rem; }
            main { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

    <img src="https://media.giphy.com/media/l41lO4vUq6vKnt4zC/giphy.gif" class="bg-gif gif1" alt="gear">
    <img src="https://media.giphy.com/media/3o7TKSHA4D3P4G0Q3W/giphy.gif" class="bg-gif gif2" alt="blueprint">
    <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" class="bg-gif gif3" alt="machine">
    <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" class="bg-gif gif4" alt="cog">

    <header>
        <h2>Junior Philippine Society of Mechanical Engineering - CTU Main</h2>
        <h1>PROJECT OJT NEXUS</h1>
        <nav>
            <button class="nav-btn active" onclick="switchView('directory')">Browse Directory</button>
            <button class="nav-btn" onclick="switchView('add')">Contribute Experience</button>
        </nav>
    </header>

    <main>
        <section id="directory-view" class="view-section active">
            <div class="filters" id="filter-container">
                <button class="filter-btn active" onclick="filterDirectory('All')">All Fields</button>
                <button class="filter-btn" onclick="filterDirectory('HVAC')">HVAC</button>
                <button class="filter-btn" onclick="filterDirectory('Machine Shop')">Machine Shop</button>
                <button class="filter-btn" onclick="filterDirectory('CAD / Design')">CAD / Design</button>
                <button class="filter-btn" onclick="filterDirectory('Power Plant')">Power Plant</button>
                <button class="filter-btn" onclick="filterDirectory('Manufacturing')">Manufacturing</button>
                <button class="filter-btn" onclick="filterDirectory('Construction')">Construction</button>
            </div>

            <div class="directory-grid" id="directory-grid">
                </div>
        </section>

        <section id="add-view" class="view-section">
            <div class="form-container">
                <h3>Add a Company / OJT Experience</h3>
                <form id="addCompanyForm" onsubmit="handleFormSubmit(event)">
                    <div class="form-group">
                        <label>Company Name *</label>
                        <input type="text" id="compName" required placeholder="e.g. SMC Consolidated Power Corp.">
                    </div>
                    
                    <div class="form-group">
                        <label>Company Address *</label>
                        <input type="text" id="compAddress" required placeholder="e.g. Mandaue City, Cebu">
                    </div>

                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Contact Person (HR/Engineer)</label>
                            <input type="text" id="compPerson" placeholder="e.g. Engr. Juan Dela Cruz">
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Contact Details (Email/Phone)</label>
                            <input type="text" id="compContact" placeholder="e.g. hr@company.com / 09123456789">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mode of Application</label>
                        <select id="compMode">
                            <option value="Physical Submission (Walk-in)">Physical Submission (Walk-in)</option>
                            <option value="Online via Email">Online via Email</option>
                            <option value="Online via Portal">Online via Portal</option>
                            <option value="Both Physical and Online">Both Physical and Online</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Engineering Fields (Select all that apply) *</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" value="HVAC" class="field-cb"> HVAC</label>
                            <label class="checkbox-item"><input type="checkbox" value="Machine Shop" class="field-cb"> Machine Shop</label>
                            <label class="checkbox-item"><input type="checkbox" value="CAD / Design" class="field-cb"> CAD / Design</label>
                            <label class="checkbox-item"><input type="checkbox" value="Power Plant" class="field-cb"> Power Plant</label>
                            <label class="checkbox-item"><input type="checkbox" value="Manufacturing" class="field-cb"> Manufacturing</label>
                            <label class="checkbox-item"><input type="checkbox" value="Construction" class="field-cb"> Construction</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Application Requirements</label>
                        <textarea id="compReq" placeholder="e.g. Endorsement Letter, Resume, MOA, Medical Certificate..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Comments / Tips / Allowance Info</label>
                        <textarea id="compComments" placeholder="e.g. They give 300/day allowance. Interview is purely technical. Need to bring your own steel-toe boots."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Submit to Directory</button>
                    <div id="systemMessage" class="system-msg">Company successfully added to the directory!</div>
                </form>
            </div>
        </section>
    </main>

    <script>
        // Initial Dummy Data
        let companies = [
            {
                name: "Tsuneishi Heavy Industries (Cebu), Inc.",
                address: "Buanoy, Balamban, Cebu",
                contacts: [{ person: "Ms. HR Recruiter", details: "recruitment@tsuneishi.com" }],
                mode: "Online via Email",
                fields: ["Manufacturing", "CAD / Design", "Machine Shop"],
                reqs: "Resume, Endorsement Letter from CTU, Transcript of Records",
                comments: "Great experience in ship building. Free lunch and uniform provided. Allowance is roughly 250/day."
            },
            {
                name: "Daikin Philippines - Cebu Branch",
                address: "Mandaue City, Cebu",
                contacts: [{ person: "Engr. Mark Santos", details: "0917-123-4567" }],
                mode: "Both Physical and Online",
                fields: ["HVAC"],
                reqs: "Resume, Application Letter, MOA",
                comments: "Very hands-on troubleshooting of VRV systems. Highly recommended if you want to pursue HVAC."
            }
        ];

        // Navigation Logic
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(view + '-view').classList.add('active');
            event.target.classList.add('active');

            if(view === 'directory') renderDirectory('All');
        }

        // Render Directory Logic
        function renderDirectory(filterField) {
            const grid = document.getElementById('directory-grid');
            grid.innerHTML = ''; 

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === filterField || (btn.innerText === 'All Fields' && filterField === 'All')) {
                    btn.classList.add('active');
                }
            });

            const filteredData = filterField === 'All' 
                ? companies 
                : companies.filter(c => c.fields.includes(filterField));

            filteredData.forEach(comp => {
                let tagsHTML = comp.fields.map(f => `<span class="tag">${f}</span>`).join('');
                
                let contactsHTML = comp.contacts.map(c => `
                    <span class="detail-text">• ${c.person ? c.person : 'N/A'} - ${c.details ? c.details : 'No details'}</span>
                `).join('');

                let cardHTML = `
                    <div class="company-card">
                        <div class="company-name">${comp.name}</div>
                        <div class="company-tags">${tagsHTML}</div>
                        
                        <div class="detail-group">
                            <span class="detail-label">📍 Address:</span>
                            <span class="detail-text">${comp.address}</span>
                        </div>

                        <div class="detail-group">
                            <span class="detail-label">📞 Contacts:</span>
                            ${contactsHTML}
                        </div>

                        <div class="detail-group">
                            <span class="detail-label">📄 Mode of Application:</span>
                            <span class="detail-text">${comp.mode}</span>
                        </div>

                        <div class="detail-group">
                            <span class="detail-label">📋 Requirements:</span>
                            <span class="detail-text">${comp.reqs || 'Not specified'}</span>
                        </div>

                        ${comp.comments ? `
                        <div class="comments-box">
                            <strong>Feedback:</strong> "${comp.comments}"
                        </div>` : ''}
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });

            if(filteredData.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-light); font-size: 1.1rem; padding: 2rem;">No companies found for this field yet. Be the first to contribute!</p>`;
            }
        }

        // Filter Trigger
        function filterDirectory(field) {
            renderDirectory(field);
        }

        // Handle Form Submission & Duplicate Logic
        function handleFormSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('compName').value.trim();
            const address = document.getElementById('compAddress').value.trim();
            const person = document.getElementById('compPerson').value.trim();
            const contactDetails = document.getElementById('compContact').value.trim();
            const mode = document.getElementById('compMode').value;
            const reqs = document.getElementById('compReq').value.trim();
            const comments = document.getElementById('compComments').value.trim();
            
            let selectedFields = [];
            document.querySelectorAll('.field-cb:checked').forEach(cb => selectedFields.push(cb.value));

            if(selectedFields.length === 0) {
                alert("Please select at least one Engineering Field.");
                return;
            }

            let existingCompanyIndex = companies.findIndex(c => c.name.toLowerCase() === name.toLowerCase());

            if(existingCompanyIndex !== -1) {
                let comp = companies[existingCompanyIndex];
                let contactExists = comp.contacts.some(c => 
                    c.person.toLowerCase() === person.toLowerCase() && 
                    c.details.toLowerCase() === contactDetails.toLowerCase()
                );

                if(contactExists) {
                    alert("This company and contact person are already listed in the directory!");
                    return;
                } else {
                    comp.contacts.push({ person: person, details: contactDetails });
                    selectedFields.forEach(f => {
                        if(!comp.fields.includes(f)) comp.fields.push(f);
                    });
                    if(comments) {
                        comp.comments += ` | Update: ${comments}`;
                    }
                    showSuccessMessage("Company already exists. New contact details successfully appended!");
                }
            } else {
                let newCompany = {
                    name: name,
                    address: address,
                    contacts: [{ person: person, details: contactDetails }],
                    mode: mode,
                    fields: selectedFields,
                    reqs: reqs,
                    comments: comments
                };
                companies.push(newCompany);
                showSuccessMessage("New company successfully added to the directory!");
            }

            document.getElementById('addCompanyForm').reset();
        }

        function showSuccessMessage(msg) {
            const msgBox = document.getElementById('systemMessage');
            msgBox.innerText = msg;
            msgBox.style.display = 'block';
            setTimeout(() => { msgBox.style.display = 'none'; }, 4000);
        }

        // Initialize App
        renderDirectory('All');
    </script>
</body>
</html>
